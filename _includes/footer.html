<footer class="footer">
  <div class="footer__copyright">
    <div class="top">
      <span style="font-size:12px;">Built by Michelle K Jamieson</span>
    </div>
    <div class="bottom">
      <img class="emoji" src="{{site.baseurl}}/img/emojis/rockon.png" alt="emoji">
      <span style="font-size:12px;">2021</span>
      <span style="font-size:10px;">Original by <a class="underline-link" href="http://github.com/bchiang7" target="_blank">Brittany Chiang</a></span>
    </div>
    </div>
  </div>
  <div class="footer__links">
    {% for link in site.social %}
    <a href="{{link.url}}" target="_blank" title="{{link.title}}">
      <span class="text">{{link.title}}</span>
      <img src="{{site.baseurl}}/img/social/{{link.title}}.svg" alt="{{link.title}}">
    </a>
    {% endfor %}
  </div>
</footer>
